<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" role="img" aria-label="送迎ホワイトボードの画面イメージ。号車ごとに乗車割りと迎え時間が並ぶ">
  <defs>
    <style>
      .win{fill:#eef1f7;stroke:#d7dce8;stroke-width:1.5}
      .bar{fill:#e1e6f1}
      .ttl{fill:#2a2f3a;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700}
      .colh{fill:#faf3e0;stroke:#e6d4a0;stroke-width:1}
      .colht{fill:#8a6d27;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700}
      .card{fill:#ffffff;stroke:#e0e4ee;stroke-width:1}
      .time{fill:#2f6df6;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700}
      .nm{fill:#2a2f3a;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500}
      .wc{fill:#c8772a;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700}
      .pill{fill:#e8f5ec;stroke:#bfe3c8;stroke-width:1}
      .pillt{fill:#268a4a;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700}
      .brand{fill:#c8a24e;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;opacity:.7;letter-spacing:.08em}
    </style>
  </defs>

  <rect class="win" x="12" y="12" width="656" height="406" rx="14"/>
  <path class="bar" d="M12 26 a14 14 0 0 1 14 -14 h628 a14 14 0 0 1 14 14 v26 h-656 z"/>
  <circle cx="34" cy="33" r="5" fill="#ff5f57"/><circle cx="52" cy="33" r="5" fill="#febc2e"/><circle cx="70" cy="33" r="5" fill="#28c840"/>
  <text class="ttl" x="92" y="38">🚐 送迎ホワイトボード ｜ 6/15(月)</text>
  <rect class="pill" x="486" y="22" width="166" height="22" rx="11"/>
  <text class="pillt" x="500" y="37">● シミュレーション自動割当済み</text>

  <!-- col 1 -->
  <rect class="colh" x="28" y="70" width="196" height="30" rx="8"/>
  <text class="colht" x="42" y="90">🚐 1号車（定員6 ／ ♿2）</text>
  <g>
    <rect class="card" x="28" y="108" width="196" height="40" rx="8"/>
    <text class="time" x="42" y="133">08:50</text><text class="nm" x="92" y="133">田中 さん</text><text class="wc" x="190" y="133">♿</text>
    <rect class="card" x="28" y="154" width="196" height="40" rx="8"/>
    <text class="time" x="42" y="179">09:05</text><text class="nm" x="92" y="179">佐藤 さん</text>
    <rect class="card" x="28" y="200" width="196" height="40" rx="8"/>
    <text class="time" x="42" y="225">09:20</text><text class="nm" x="92" y="225">鈴木 さん</text><text class="wc" x="190" y="225">♿</text>
  </g>

  <!-- col 2 -->
  <rect class="colh" x="242" y="70" width="196" height="30" rx="8"/>
  <text class="colht" x="256" y="90">🚐 2号車（定員6）</text>
  <g>
    <rect class="card" x="242" y="108" width="196" height="40" rx="8"/>
    <text class="time" x="256" y="133">08:45</text><text class="nm" x="306" y="133">高橋 さん</text>
    <rect class="card" x="242" y="154" width="196" height="40" rx="8"/>
    <text class="time" x="256" y="179">09:00</text><text class="nm" x="306" y="179">伊藤 さん</text>
    <rect class="card" x="242" y="200" width="196" height="40" rx="8"/>
    <text class="time" x="256" y="225">09:15</text><text class="nm" x="306" y="225">渡辺 さん</text>
  </g>

  <!-- col 3 -->
  <rect class="colh" x="456" y="70" width="196" height="30" rx="8"/>
  <text class="colht" x="470" y="90">🚐 3号車（定員4 ／ ♿1）</text>
  <g>
    <rect class="card" x="456" y="108" width="196" height="40" rx="8"/>
    <text class="time" x="470" y="133">09:00</text><text class="nm" x="520" y="133">山本 さん</text><text class="wc" x="618" y="133">♿</text>
    <rect class="card" x="456" y="154" width="196" height="40" rx="8"/>
    <text class="time" x="470" y="179">09:10</text><text class="nm" x="520" y="179">中村 さん</text>
  </g>

  <!-- bottom strip: route / unassigned -->
  <rect x="28" y="262" width="624" height="132" rx="10" fill="#ffffff" stroke="#e0e4ee"/>
  <text class="colht" x="44" y="288" fill="#6b7280">当日変更 / 未割当</text>
  <rect class="card" x="44" y="300" width="180" height="34" rx="8" fill="#fff6f6" stroke="#f3c9c9"/>
  <text x="58" y="322" fill="#c0392b" font-family="'Noto Sans JP',sans-serif" font-size="12.5" font-weight="700">⚠ 小林さん 本日キャンセル</text>
  <rect class="card" x="236" y="300" width="190" height="34" rx="8"/>
  <text x="250" y="322" fill="#2a2f3a" font-family="'Noto Sans JP',sans-serif" font-size="12.5">空席: 2号車 午前 ×1</text>
  <rect class="pill" x="438" y="300" width="200" height="34" rx="8"/>
  <text x="454" y="322" fill="#268a4a" font-family="'Noto Sans JP',sans-serif" font-size="12.5" font-weight="700">✓ 変更は全員の画面に即反映</text>
  <text x="44" y="362" fill="#9aa0b4" font-family="'Noto Sans JP',sans-serif" font-size="12">扱う情報は 氏名・住所・送迎時間・車両・車椅子席の要否 のみ（健康情報なし）</text>
  <text x="44" y="382" fill="#9aa0b4" font-family="'Noto Sans JP',sans-serif" font-size="12">決まった時刻に自動で印刷 — 朝は出てきた紙を取るだけ</text>

  <text class="brand" x="600" y="408">FRENVOX</text>
</svg>
