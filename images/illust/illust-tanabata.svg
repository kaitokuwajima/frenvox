<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 七夕かざり：架空のイラスト -->
  <rect width="800" height="600" fill="#1d2a4a"/>
  <!-- stars -->
  <g fill="#f7e07a">
    <circle cx="90" cy="80" r="5"/><circle cx="200" cy="40" r="4"/><circle cx="320" cy="90" r="6"/>
    <circle cx="540" cy="50" r="4"/><circle cx="700" cy="90" r="5"/><circle cx="640" cy="160" r="4"/>
    <circle cx="140" cy="170" r="4"/><circle cx="740" cy="220" r="4"/>
    <path d="M430 30 l7 16 17 2 -12 12 3 17 -15 -8 -15 8 3 -17 -12 -12 17 -2z"/>
  </g>
  <!-- milky way -->
  <path d="M520 0 Q420 300 560 600 L660 600 Q500 300 620 0z" fill="#ffffff" opacity="0.08"/>
  <!-- bamboo -->
  <g>
    <rect x="120" y="120" width="26" height="480" rx="13" fill="#3f7d4e"/>
    <rect x="118" y="240" width="30" height="8" rx="4" fill="#2e5c3a"/>
    <rect x="118" y="400" width="30" height="8" rx="4" fill="#2e5c3a"/>
    <path d="M140 180 q120 -40 220 -10" stroke="#3f7d4e" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M140 300 q140 -30 250 20" stroke="#3f7d4e" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- leaves -->
    <g fill="#5ea36b">
      <path d="M250 150 q40 -26 70 -24 q-20 28 -56 34z"/>
      <path d="M330 168 q40 -26 70 -24 q-20 28 -56 34z"/>
      <path d="M300 300 q40 -26 70 -24 q-20 28 -56 34z"/>
      <path d="M380 322 q40 -26 70 -24 q-20 28 -56 34z"/>
    </g>
  </g>
  <!-- tanzaku strips -->
  <g font-family="'Hiragino Mincho ProN',serif" font-size="26" fill="#444">
    <g transform="rotate(6 320 250)">
      <line x1="320" y1="180" x2="320" y2="210" stroke="#ddd" stroke-width="2"/>
      <rect x="295" y="210" width="50" height="130" rx="4" fill="#f8b6c8"/>
      <text x="320" y="245" text-anchor="middle" writing-mode="tb" style="writing-mode:vertical-rl">げんき</text>
    </g>
    <g transform="rotate(-7 420 320)">
      <line x1="420" y1="250" x2="420" y2="280" stroke="#ddd" stroke-width="2"/>
      <rect x="395" y="280" width="50" height="130" rx="4" fill="#a8d8f0"/>
      <text x="420" y="298" font-size="23" text-anchor="middle" writing-mode="tb" style="writing-mode:vertical-rl">ながいき</text>
    </g>
    <g transform="rotate(5 250 420)">
      <line x1="250" y1="340" x2="250" y2="370" stroke="#ddd" stroke-width="2"/>
      <rect x="225" y="370" width="50" height="130" rx="4" fill="#fdf3b3"/>
      <text x="250" y="405" text-anchor="middle" writing-mode="tb" style="writing-mode:vertical-rl">えがお</text>
    </g>
  </g>
  <!-- paper ornament -->
  <g transform="rotate(-4 560 420)">
    <line x1="560" y1="330" x2="560" y2="360" stroke="#ddd" stroke-width="2"/>
    <circle cx="560" cy="400" r="42" fill="#f2784b"/>
    <circle cx="560" cy="400" r="28" fill="#f7a072"/>
    <path d="M560 442 l-14 70 q14 12 28 0z" fill="#f2c14e"/>
  </g>
  <text x="400" y="575" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="24" fill="#8fa3cf" text-anchor="middle">イラストはイメージです</text>
</svg>
