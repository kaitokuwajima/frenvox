<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 風船バレー：架空のイラスト -->
  <rect width="800" height="600" fill="#fdf6e3"/>
  <rect y="430" width="800" height="170" fill="#f3e7c9"/>
  <!-- windows -->
  <rect x="60" y="60" width="180" height="130" rx="10" fill="#dceefb" stroke="#bcd8ee" stroke-width="6"/>
  <rect x="560" y="60" width="180" height="130" rx="10" fill="#dceefb" stroke="#bcd8ee" stroke-width="6"/>
  <!-- balloon -->
  <ellipse cx="400" cy="150" rx="78" ry="92" fill="#ef6b6b"/>
  <ellipse cx="372" cy="118" rx="22" ry="30" fill="#ffffff" opacity="0.45"/>
  <path d="M392 240 l8 14 8-14z" fill="#d05555"/>
  <!-- motion lines -->
  <path d="M300 100 q-20 -18 -44 -22" stroke="#f0b6b6" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M505 100 q20 -18 44 -22" stroke="#f0b6b6" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- left person on chair -->
  <g>
    <rect x="120" y="430" width="120" height="16" rx="8" fill="#b08d57"/>
    <rect x="130" y="446" width="14" height="80" rx="7" fill="#b08d57"/>
    <rect x="216" y="446" width="14" height="80" rx="7" fill="#b08d57"/>
    <!-- body -->
    <path d="M130 432 q50 -70 110 -28 l-6 30 q-50 22 -98 6z" fill="#7fb3a3"/>
    <!-- raised arm -->
    <path d="M225 392 q40 -50 70 -96" stroke="#7fb3a3" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="300" cy="288" r="16" fill="#f6cfa9"/>
    <!-- head -->
    <circle cx="160" cy="345" r="44" fill="#f6cfa9"/>
    <path d="M120 330 a44 44 0 0 1 80 -8 q-44 14 -80 8z" fill="#cfd4d8"/>
    <circle cx="148" cy="350" r="4.5" fill="#5a4632"/>
    <circle cx="176" cy="350" r="4.5" fill="#5a4632"/>
    <path d="M150 368 q12 10 24 0" stroke="#c96a5a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="136" cy="362" r="7" fill="#f4a9a0" opacity="0.7"/>
    <circle cx="188" cy="362" r="7" fill="#f4a9a0" opacity="0.7"/>
  </g>
  <!-- right person on chair -->
  <g>
    <rect x="560" y="430" width="120" height="16" rx="8" fill="#b08d57"/>
    <rect x="570" y="446" width="14" height="80" rx="7" fill="#b08d57"/>
    <rect x="656" y="446" width="14" height="80" rx="7" fill="#b08d57"/>
    <path d="M670 432 q-50 -70 -110 -28 l6 30 q50 22 98 6z" fill="#e8a87c"/>
    <path d="M575 392 q-40 -50 -70 -96" stroke="#e8a87c" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="500" cy="288" r="16" fill="#f6cfa9"/>
    <circle cx="640" cy="345" r="44" fill="#f6cfa9"/>
    <path d="M600 332 a44 44 0 0 1 80 -4 q-40 -22 -80 4z" fill="#ffffff"/>
    <circle cx="628" cy="350" r="4.5" fill="#5a4632"/>
    <circle cx="656" cy="350" r="4.5" fill="#5a4632"/>
    <path d="M630 368 q12 10 24 0" stroke="#c96a5a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="616" cy="362" r="7" fill="#f4a9a0" opacity="0.7"/>
    <circle cx="668" cy="362" r="7" fill="#f4a9a0" opacity="0.7"/>
  </g>
  <text x="400" y="575" font-family="'Hiragino Maru Gothic ProN','Zen Maru Gothic',sans-serif" font-size="24" fill="#b09a6a" text-anchor="middle">イラストはイメージです</text>
</svg>
