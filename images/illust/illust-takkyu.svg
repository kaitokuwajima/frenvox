<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 卓球大会：架空のイラスト -->
  <rect width="800" height="600" fill="#eef4f6"/>
  <rect y="450" width="800" height="150" fill="#dde8ec"/>
  <!-- table -->
  <g>
    <path d="M100 360 L700 360 L640 470 L160 470 z" fill="#1f6fae"/>
    <path d="M100 360 L700 360 L640 470 L160 470 z" fill="none" stroke="#ffffff" stroke-width="6"/>
    <line x1="400" y1="360" x2="400" y2="470" stroke="#ffffff" stroke-width="5"/>
    <rect x="170" y="470" width="22" height="80" fill="#345" rx="6"/>
    <rect x="608" y="470" width="22" height="80" fill="#345" rx="6"/>
    <!-- net -->
    <rect x="248" y="318" width="304" height="46" fill="#f4f7f8" opacity="0.92"/>
    <path d="M248 318 h304 M248 333 h304 M248 348 h304 M278 318 v46 M328 318 v46 M378 318 v46 M428 318 v46 M478 318 v46 M528 318 v46" stroke="#b8c6cd" stroke-width="2.5"/>
    <rect x="248" y="312" width="304" height="10" rx="5" fill="#3d5a6c"/>
  </g>
  <!-- paddle -->
  <g transform="rotate(-30 620 240)">
    <circle cx="620" cy="220" r="62" fill="#c0392b"/>
    <circle cx="620" cy="220" r="62" fill="none" stroke="#8e2a1f" stroke-width="6"/>
    <rect x="606" y="276" width="28" height="74" rx="12" fill="#caa472"/>
  </g>
  <!-- ball + motion -->
  <circle cx="330" cy="180" r="22" fill="#fff8e7" stroke="#e0d6bb" stroke-width="3"/>
  <path d="M300 210 q-50 40 -60 90" stroke="#cfdbe2" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="2 18"/>
  <!-- cheering flags -->
  <g>
    <rect x="80" y="100" width="10" height="120" rx="5" fill="#b08d57"/>
    <path d="M90 100 l90 18 -90 22z" fill="#ef8c6b"/>
  </g>
  <text x="400" y="575" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="24" fill="#7e98a4" text-anchor="middle">イラストはイメージです</text>
</svg>
